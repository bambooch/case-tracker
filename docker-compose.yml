services:
  postgres:
    image: postgres:16-alpine
    container_name: case-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-case_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-case_tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-case_tracker}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-case_tracker} -d ${POSTGRES_DB:-case_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: